<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Filler</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📅 Date Filler</h1>

    <div class="toolbar">

        <button id="paste">📋 Paste</button>

        <button id="process">⚙️ Process</button>

        <button id="copy">📄 Copy Output</button>

    </div>

    <div class="main">

        <div class="panel">

            <h2>📥 Input</h2>

            <textarea
                id="input"
                placeholder="Paste your Rolimon's data here..."
            ></textarea>

        </div>

        <div class="panel">

            <h2>📤 Output</h2>

            <textarea
                id="output"
                readonly
                placeholder="Processed data will appear here..."
            ></textarea>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
